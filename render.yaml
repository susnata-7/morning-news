services:
  - type: worker
    name: news-digest-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python news_digest.py
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NOTIFY_ME_TOKEN
        sync: false
